<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Izzuddin — Mobile Engineer</title>
  <script>
    // GitHub Pages SPA routing workaround.
    // Stores the full URL in sessionStorage then redirects to the root,
    // where index.html picks it up and restores the path.
    var pathSegmentsToKeep = 1; // set to 0 for custom domain, 1 for <user>.github.io/<repo>

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
