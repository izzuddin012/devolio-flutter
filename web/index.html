<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <!-- Preload critical resources -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO — update these with your own name, role, and site URL -->
  <meta name="description" content="Your Name — Your Job Title. Short description of your expertise.">
  <meta name="keywords" content="Flutter, Portfolio, Developer">
  <meta name="author" content="Your Name">

  <!-- Open Graph — update with your own details -->
  <meta property="og:title" content="Your Name — Portfolio">
  <meta property="og:description" content="Short description for social link previews.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yourusername.github.io/your-repo-name">
  <meta property="og:image" content="https://yourusername.github.io/your-repo-name/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- GitHub Pages SPA redirect handler -->
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>

  <!-- Update this title with your own name and role -->
  <title>Your Name — Your Job Title</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent flash of unstyled content */
    body {
      margin: 0;
      background-color: #0A0A0A;
    }

    /* ── Loading splash ───────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0A0A;
      transition: opacity 0.5s ease;
      z-index: 9999;
      gap: 0;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Monogram card */
    .splash-monogram {
      width: 72px;
      height: 72px;
      border: 1.5px solid #879A77;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
      box-shadow: 0 0 32px 0 rgba(135, 154, 119, 0.15),
                  inset 0 0 20px 0 rgba(135, 154, 119, 0.06);
      animation: breathe 3s ease-in-out infinite;
    }
    .splash-monogram span {
      color: #879A77;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      user-select: none;
    }
    /* Corner accents */
    .splash-monogram::before,
    .splash-monogram::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: #879A77;
      border-style: solid;
      opacity: 0.5;
    }
    .splash-monogram::before {
      top: -4px; left: -4px;
      border-width: 1.5px 0 0 1.5px;
      border-radius: 2px 0 0 0;
    }
    .splash-monogram::after {
      bottom: -4px; right: -4px;
      border-width: 0 1.5px 1.5px 0;
      border-radius: 0 0 2px 0;
    }

    /* Name & role */
    .splash-name {
      color: #F5F5F5;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .splash-role {
      color: #879A77;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Three-dot pulse */
    .splash-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .splash-dots span {
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #879A77;
      animation: dot-pulse 1.4s ease-in-out infinite both;
    }
    .splash-dots span:nth-child(1) { animation-delay: 0s; }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1; }
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 24px 0 rgba(135, 154, 119, 0.12),
                              inset 0 0 16px 0 rgba(135, 154, 119, 0.04); }
      50%       { box-shadow: 0 0 48px 0 rgba(135, 154, 119, 0.25),
                              inset 0 0 24px 0 rgba(135, 154, 119, 0.10); }
    }
  </style>
</head>
<body>
  <!--
    Loading splash — visible immediately, dismissed on flutter-first-frame.
    Update the monogram (2 letters), name, and role to match your own.
  -->
  <div id="loading">
    <div class="splash-monogram"><span>YN</span></div>
    <div class="splash-name">Your Name</div>
    <div class="splash-role">Your Job Title</div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 400);
      }
    });
  </script>
</body>
</html>
